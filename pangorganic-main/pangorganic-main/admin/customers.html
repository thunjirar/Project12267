<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Customers</title>

    <link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: #fff5f8;
            margin: 0;
        }

        header {
            background: #ff4d6d;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 28px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #ff4d6d;
            color: white;
        }

        .btn-delete {
            background: red;
        }
    </style>
</head>
<body>

<header>
    👥 ระบบลูกค้า (Customers)
</header>

<div class="container">

    <!-- ฟอร์มเพิ่มลูกค้า -->
    <div class="card">
        <h3>➕ เพิ่มลูกค้า</h3>
        <input type="text" id="name" placeholder="ชื่อลูกค้า">
        <input type="text" id="phone" placeholder="เบอร์โทร">
        <button class="btn" onclick="addCustomer()">เพิ่ม</button>
    </div>

    <!-- รายการลูกค้า -->
    <div id="customerList"></div>

</div>

<script>
    let customers = [
        { id: 1, name: "สมชาย", phone: "0812345678" },
        { id: 2, name: "สมหญิง", phone: "0899999999" }
    ];

    function renderCustomers() {
        let html = "";

        customers.forEach(c => {
            html += `
                <div class="card">
                    <h3>👤 ${c.name}</h3>
                    <p>📞 ${c.phone}</p>
                    <button class="btn btn-delete" onclick="deleteCustomer(${c.id})">
                        ❌ ลบ
                    </button>
                </div>
            `;
        });

        document.getElementById("customerList").innerHTML = html;
    }

    function addCustomer() {
        let name = document.getElementById("name").value;
        let phone = document.getElementById("phone").value;

        if (name === "" || phone === "") {
            alert("กรุณากรอกข้อมูล");
            return;
        }

        customers.push({
            id: Date.now(),
            name: name,
            phone: phone
        });

        document.getElementById("name").value = "";
        document.getElementById("phone").value = "";

        renderCustomers();
    }

    function deleteCustomer(id) {
        customers = customers.filter(c => c.id !== id);
        renderCustomers();
    }

    renderCustomers();
</script>

</body>
</html>
