<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>

    <link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: #f0f9ff;
            margin: 0;
        }

        header {
            background: #4cc9f0;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 28px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .low-stock {
            color: red;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin: 10px 5px;
            padding: 8px 15px;
            background: #4895ef;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background: #4361ee;
        }

        .delete-btn {
            background: red;
        }

        .delete-btn:hover {
            background: darkred;
        }
    </style>
</head>
<body>

<header>
    📦 ระบบคลังสินค้า (Inventory)
</header>

<div class="container" id="itemList"></div>

<div style="text-align:center;">
    <button class="btn" onclick="addItem()">➕ เพิ่มสินค้า</button>
</div>

<script>
    let items = [
        { name: "Classic American loaf bread", price: 165, quantity: 10 },
        { name: "Olive Bread", price: 159, quantity: 3 },
        { name: "Focaccia", price: 289, quantity: 2 }
    ];

    function renderItems() {
        let html = "";

        if (items.length === 0) {
            html = "<p>ไม่มีสินค้า</p>";
        } else {
            items.forEach((item, index) => {
                html += `
                    <div class="card">
                        <h3>📦 ${item.name}</h3>
                        <p>💰 ราคา: ${item.price} บาท</p>
                        <p>📊 จำนวน: ${
                            item.quantity <= 5 
                            ? `<span class="low-stock">${item.quantity} (ใกล้หมด!)</span>` 
                            : item.quantity
                        }</p>

                        <button class="btn delete-btn" onclick="deleteItem(${index})">
                            🗑 ลบสินค้า
                        </button>
                    </div>
                `;
            });
        }

        document.getElementById("itemList").innerHTML = html;
    }

    function addItem() {
        let name = prompt("ชื่อสินค้า:");
        let price = prompt("ราคา:");
        let quantity = prompt("จำนวน:");

        // ตรวจสอบ input
        if (!name || isNaN(price) || isNaN(quantity)) {
            alert("กรุณากรอกข้อมูลให้ถูกต้อง");
            return;
        }

        items.push({
            name: name,
            price: Number(price),
            quantity: Number(quantity)
        });

        renderItems();
    }

    function deleteItem(index) {
        if (confirm("ต้องการลบสินค้านี้หรือไม่?")) {
            items.splice(index, 1);
            renderItems();
        }
    }

    renderItems();
</script>

</body>
</html>
