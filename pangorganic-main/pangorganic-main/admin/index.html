<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            margin: 0;
            background: #f5f7ff;
        }

        header {
            background: #6a5acd;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        .back-nav {
            padding: 15px 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        .back-nav a {
            text-decoration: none;
            color: #6a5acd;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #f0f0f0;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(106, 90, 205, 0.15);
        }

        .icon {
            font-size: 45px;
            margin-bottom: 15px;
        }

        h3 {
            margin: 10px 0;
            color: #333;
        }

        p {
            color: #777;
            margin: 0;
        }

        a {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>

<header>
    🌟 ระบบจัดการร้านค้า (Admin) 🌟
</header>

<div class="container">
    <a href="inventory.html">
        <div class="card">
            <div class="icon">📦</div>
            <h3>Inventory</h3>
            <p>จัดการสินค้า</p>
        </div>
    </a>

    <a href="orders.html">
        <div class="card">
            <div class="icon">🧾</div>
            <h3>Orders</h3>
            <p>รายการสั่งซื้อ</p>
        </div>
    </a>

    <a href="shipping.html">
        <div class="card">
            <div class="icon">🚚</div>
            <h3>Shipping</h3>
            <p>การจัดส่ง</p>
        </div>
    </a>

    <a href="customers.html">
        <div class="card">
            <div class="icon">👥</div>
            <h3>Customers</h3>
            <p>รายชื่อลูกค้า</p>
        </div>
    </a>
</div>

</body>
</html>
