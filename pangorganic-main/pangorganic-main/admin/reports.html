<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Reports</title>

    <link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: #eef7ff;
            margin: 0;
        }

        header {
            background: #4361ee;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 28px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .big {
            font-size: 24px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th {
            background: #4895ef;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    📊 รายงาน (Reports)
</header>

<div class="container">

    <!-- สรุป -->
    <div class="card">
        <p>💰 ยอดขายรวม</p>
        <p class="big" id="totalSales">0 บาท</p>
    </div>

    <div class="card">
        <p>🧾 จำนวนออเดอร์</p>
        <p class="big" id="totalOrders">0</p>
    </div>

    <!-- ตาราง -->
    <div class="card">
        <h3>📋 รายการทั้งหมด</h3>
        <table>
            <thead>
                <tr>
                    <th>สินค้า</th>
                    <th>ราคา</th>
                    <th>สถานะ</th>
                </tr>
            </thead>
            <tbody id="reportTable"></tbody>
        </table>
    </div>

</div>

<script>
    // ใช้ข้อมูลเดียวกับ orders
    let orders = [
        { name: " White Bread", price: 200, status: "success" },
        { name: "White Bread", price: 350, status: "success" },
        { name: " Focaccia", price: 800, status: "pending" }
    ];

    function loadReport() {
        let total = 0;
        let count = orders.length;
        let table = "";

        orders.forEach(o => {
            if (o.status === "success") {
                total += o.price;
            }

            table += `
                <tr>
                    <td>${o.name}</td>
                    <td>${o.price}</td>
                    <td>${getStatusText(o.status)}</td>
                </tr>
            `;
        });

        document.getElementById("totalSales").innerText = total + " บาท";
        document.getElementById("totalOrders").innerText = count;
        document.getElementById("reportTable").innerHTML = table;
    }

    function getStatusText(status) {
        if (status === "success") return "สำเร็จ";
        if (status === "pending") return "กำลังดำเนินการ";
        if (status === "cancel") return "ยกเลิก";
    }

    loadReport();
</script>

</body>
</html>
