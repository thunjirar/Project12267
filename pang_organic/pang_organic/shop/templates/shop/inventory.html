{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<style>
    /* สไตล์เฉพาะหน้า Inventory */
    .inventory-section { padding: 50px 5%; background-color: #fdfaf7; min-height: 80vh; }
    .inventory-container { max-width: 1000px; margin: 0 auto; }
    
    .inventory-header { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 30px; 
    }

    .card { 
        background: white; 
        padding: 20px; 
        margin-bottom: 15px; 
        border-radius: 15px; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        display: grid;
        grid-template-columns: 2fr 1fr 1fr auto;
        align-items: center;
        gap: 20px;
        border-left: 5px solid #6b4423;
    }

    .item-name { font-weight: bold; color: #6b4423; font-size: 1.1rem; }
    .item-price { color: #888; }
    
    .stock-badge {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.9rem;
        text-align: center;
    }
    
    .status-ok { background: #e8f5e9; color: #2e7d32; }
    .status-low { background: #ffebee; color: #c62828; font-weight: bold; animation: pulse 2s infinite; }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.7; }
        100% { opacity: 1; }
    }

    .btn-add { 
        background: #6b4423; 
        color: white; 
        padding: 12px 25px; 
        border: none; 
        border-radius: 30px; 
        cursor: pointer; 
        font-weight: bold;
        transition: 0.3s;
    }
    
    .btn-add:hover { background: #56361c; transform: translateY(-2px); }

    .btn-delete { 
        background: none; 
        color: #d9534f; 
        border: 1px solid #d9534f; 
        padding: 5px 10px; 
        border-radius: 8px; 
        cursor: pointer; 
    }
    
    .btn-delete:hover { background: #d9534f; color: white; }

    @media (max-width: 768px) {
        .card { grid-template-columns: 1fr; gap: 10px; text-align: center; }
        .inventory-header { flex-direction: column; gap: 20px; }
    }
</style>

<div style="text-align: center; padding: 40px 0;">
    <h1 style="font-size: 3rem; color: #6b4423; text-shadow: 2px 2px 4px rgba(0,0,0,0.1);">Inventory Management</h1>
    <p style="color: #888;">ระบบจัดการสต็อกสินค้าคงคลัง</p>
</div>

<section class="inventory-section">
    <div class="inventory-container">
        
        <div class="inventory-header">
            <h2 style="color: #6b4423; margin: 0;">รายการสินค้าในคลัง</h2>
            <button class="btn-add" onclick="addItem()">➕ เพิ่มสินค้าใหม่</button>
        </div>

        <div id="itemList">
            </div>

    </div>
</section>

<script>
    // ข้อมูลจำลอง (ในอนาคตควรดึงมาจาก Database)
    let items = [
        { name: "Classic American loaf bread", price: 165, quantity: 10 },
        { name: "Olive Bread", price: 159, quantity: 3 },
        { name: "Focaccia", price: 289, quantity: 2 },
        { name: "Sourdough", price: 220, quantity: 15 }
    ];

    function renderItems() {
        let html = "";

        if (items.length === 0) {
            html = `
                <div style="text-align:center; padding:50px; background:white; border-radius:15px;">
                    <p style="color:#888;">ไม่มีสินค้าในสต็อก</p>
                </div>
            `;
        } else {
            items.forEach((item, index) => {
                const isLow = item.quantity <= 5;
                html += `
                    <div class="card">
                        <div class="item-name">📦 ${item.name}</div>
                        <div class="item-price">💰 ${item.price} THB</div>
                        <div>
                            <span class="stock-badge ${isLow ? 'status-low' : 'status-ok'}">
                                ${isLow ? '⚠️ เหลือแค่: ' : '📊 จำนวน: '} ${item.quantity}
                            </span>
                        </div>
                        <button class="btn-delete" onclick="deleteItem(${index})">
                            🗑 ลบ
                        </button>
                    </div>
                `;
            });
        }

        document.getElementById("itemList").innerHTML = html;
    }

    function addItem() {
        let name = prompt("ระบุชื่อสินค้า:");
        if (!name) return; // กดยกเลิก
        
        let price = prompt("ระบุราคา (บาท):");
        let quantity = prompt("ระบุจำนวนสินค้า:");

        if (isNaN(price) || isNaN(quantity) || price === "" || quantity === "") {
            alert("❌ กรุณากรอกตัวเลขในช่องราคาและจำนวน");
            return;
        }

        items.unshift({
            name: name,
            price: Number(price),
            quantity: Number(quantity)
        });

        renderItems();
    }

    function deleteItem(index) {
        if (confirm(`ยืนยันการลบ "${items[index].name}" ออกจากคลัง?`)) {
            items.splice(index, 1);
            renderItems();
        }
    }

    // เรียกทำงานครั้งแรก
    renderItems();
</script>
{% endblock %}
