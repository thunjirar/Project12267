{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<style>
    /* สไตล์เพิ่มเติมสำหรับหน้า Cart */
    .cart-section { padding: 40px 5%; min-height: 60vh; background: #fff; }
    .cart-container { background: #fff; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); padding: 30px; border: 1px solid #eee; }
    .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f4f4f4; padding-bottom: 15px; margin-bottom: 20px; }
    
    /* จัดการรายการสินค้าในตะกร้า */
    .cart-items { margin-bottom: 30px; }
    .cart-item { display: grid; grid-template-columns: 100px 2fr 1fr 1fr auto; align-items: center; gap: 20px; padding: 20px 0; border-bottom: 1px solid #f9f9f9; }
    .cart-item-image img { width: 90px; height: 90px; object-fit: cover; border-radius: 12px; background: #fdfaf7; }
    
    .cart-item-details h3 { margin: 0; color: #6b4423; font-size: 1.2rem; }
    .cart-item-details p { color: #888; font-size: 0.85rem; margin: 5px 0; }
    .cart-item-price { font-weight: bold; color: #bc8f8f; }

    .cart-item-quantity { display: flex; align-items: center; gap: 10px; }
    .quantity-btn { background: #6b4423; color: white; border: none; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .quantity-btn:hover { background: #56361c; }
    
    .cart-item-total { font-weight: bold; color: #6b4423; font-size: 1.1rem; }
    .remove-item { color: #ff4444; font-size: 28px; cursor: pointer; background: none; border: none; padding: 0 10px; }

    /* ส่วนสรุปยอดเงิน */
    .cart-summary { margin-top: 30px; background: #fdfaf7; padding: 25px; border-radius: 15px; width: 100%; max-width: 450px; margin-left: auto; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; color: #555; }
    .summary-row.total { border-top: 2px solid #6b4423; padding-top: 15px; font-weight: bold; font-size: 1.3rem; color: #6b4423; margin-top: 10px; }
    
    /* ปุ่มกด */
    .cart-actions { display: flex; justify-content: space-between; margin-top: 40px; gap: 15px; }
    .checkout-btn { background: #6b4423; color: white; padding: 15px 40px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 1rem; flex: 1; transition: 0.3s; }
    .checkout-btn:hover { background: #56361c; box-shadow: 0 5px 15px rgba(107,68,35,0.2); }
    .continue-shopping-btn { background: #f0f0f0; color: #333; padding: 15px 40px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .continue-shopping-btn:hover { background: #e0e0e0; }

    @media (max-width: 768px) {
        .cart-item { grid-template-columns: 80px 1fr auto; gap: 15px; }
        .cart-item-total { display: none; }
        .cart-actions { flex-direction: column-reverse; }
    }
</style>

<h1 style="text-align: center; padding: 40px 20px 20px; font-size: 3rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); color: #6b4423;">Cart</h1>

<section class="cart-section">
    <div class="cart-container">
        <div class="cart-header">
            <h2>Shopping Cart</h2>
            <div class="cart-count" id="header-cart-count">0 items</div>
        </div>
        
        <div class="cart-items" id="cart-items-container"></div>

        <div class="cart-summary">
            <div class="summary-header">
                <h3>Order Summary</h3>
            </div>
            <div class="summary-row">
                <span id="cart-subtotal-text">Subtotal (0 items)</span>
                <span class="subtotal">0 THB</span>
            </div>
            <div class="summary-row">
                <span>Delivery Fee</span>
                <span class="delivery">50 THB</span>
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span class="total-amount">0 THB</span>
            </div>
        </div>

        <div class="cart-actions">
            <button class="continue-shopping-btn" onclick="location.href='{% url 'menu' %}'">Continue Shopping</button>
            <button class="checkout-btn" onclick="location.href='{% url 'checkout' %}'">Checkout</button>
        </div>
    </div>
</section>

<script>
    function updateCartDisplay() {
        // ดึงข้อมูลจาก LocalStorage
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const container = document.getElementById('cart-items-container');
        const subtotalElem = document.querySelector('.subtotal');
        const totalElem = document.querySelector('.total-amount');
        const headerCount = document.getElementById('header-cart-count');
        const subtotalText = document.getElementById('cart-subtotal-text');
        
        if (cart.length === 0) {
            container.innerHTML = `
                <div style="text-align:center; padding: 60px 20px;">
                    <i class="fas fa-shopping-basket" style="font-size: 4rem; color: #eee; margin-bottom: 20px;"></i>
                    <p style="font-size: 1.2rem; color: #888;">Your cart is empty</p>
                    <button class="continue-shopping-btn" style="margin-top:20px;" onclick="location.href='{% url 'menu' %}'">Go to Menu</button>
                </div>`;
            headerCount.textContent = "0 items";
            subtotalText.textContent = "Subtotal (0 items)";
            subtotalElem.textContent = "0 THB";
            totalElem.textContent = "0 THB";
            return;
        }
        
        let subtotal = 0;
        let totalItems = 0;
        container.innerHTML = '';
        
        cart.forEach((item, index) => {
            const itemTotal = item.price * item.quantity;
            subtotal += itemTotal;
            totalItems += item.quantity;
            
            // ตรวจสอบรูปภาพ
            let imgSrc = item.image;
            if (!imgSrc || imgSrc === "") imgSrc = "{% static 'shop/images/default.jpg' %}";

            container.innerHTML += `
                <div class="cart-item">
                    <div class="cart-item-image">
                        <img src="${imgSrc}" alt="${item.name}" onerror="this.src='{% static 'shop/images/default.jpg' %}'">
                    </div>
                    <div class="cart-item-details">
                        <h3>${item.name}</h3>
                        <p>${item.description || 'Freshly baked with love'}</p>
                        <div class="cart-item-price">${item.price.toLocaleString()} THB</div>
                    </div>
                    <div class="cart-item-quantity">
                        <button class="quantity-btn" onclick="updateQuantity(${index}, -1)">-</button>
                        <span class="quantity">${item.quantity}</span>
                        <button class="quantity-btn" onclick="updateQuantity(${index}, 1)">+</button>
                    </div>
                    <div class="cart-item-total">${itemTotal.toLocaleString()} THB</div>
                    <button class="remove-item" onclick="removeItem(${index})">&times;</button>
                </div>
            `;
        });
        
        const delivery = 50;
        const total = subtotal + delivery;
        
        headerCount.textContent = `${totalItems} items`;
        subtotalText.textContent = `Subtotal (${totalItems} items)`;
        subtotalElem.textContent = `${subtotal.toLocaleString()} THB`;
        totalElem.textContent = `${total.toLocaleString()} THB`;
    }

    function updateQuantity(index, change) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart[index].quantity += change;
        
        if (cart[index].quantity <= 0) {
            removeItem(index);
        } else {
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartDisplay();
        }
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        if(confirm('Remove this item from cart?')) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartDisplay();
        }
    }

    // รันฟังก์ชันทันทีที่โหลดหน้า
    document.addEventListener('DOMContentLoaded', updateCartDisplay);
</script>
{% endblock %}
