{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<style>
    /* สไตล์เฉพาะสำหรับหน้า Login */
    .login-page-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 80px 20px;
        background-color: #fdfaf7; /* สีครีมอ่อนๆ */
        min-height: 70vh;
    }

    .login-card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(107, 68, 35, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    .login-title {
        color: #6b4423;
        font-size: 2.5rem;
        margin-bottom: 10px;
        font-family: 'serif'; /* หรือฟอนต์หัวข้อของร้าน */
    }

    .login-subtitle {
        color: #888;
        margin-bottom: 30px;
        font-size: 0.95rem;
    }

    .login-form {
        text-align: left;
    }

    .input-group {
        margin-bottom: 20px;
    }

    .input-group label {
        display: block;
        margin-bottom: 8px;
        color: #6b4423;
        font-weight: 500;
        text-transform: capitalize;
    }

    .input-group input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 1rem;
        box-sizing: border-box;
        transition: 0.3s;
    }

    .input-group input:focus {
        border-color: #6b4423;
        outline: none;
        box-shadow: 0 0 5px rgba(107, 68, 35, 0.2);
    }

    .login-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        font-size: 0.85rem;
    }

    .remember-me {
        display: flex;
        align-items: center;
        gap: 5px;
        color: #666;
        cursor: pointer;
    }

    .forgot-password {
        color: #6b4423;
        text-decoration: none;
    }

    .forgot-password:hover {
        text-decoration: underline;
    }

    .login-btn {
        width: 100%;
        padding: 14px;
        background-color: #6b4423;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .login-btn:hover {
        background-color: #56361c;
        transform: translateY(-2px);
    }

    .login-footer {
        margin-top: 25px;
        font-size: 0.9rem;
        color: #666;
    }

    .register-link {
        color: #6b4423;
        font-weight: bold;
        text-decoration: none;
    }

    .back-link {
        display: block;
        margin-top: 15px;
        color: #aaa;
        text-decoration: none;
    }

    .back-link:hover {
        color: #6b4423;
    }
</style>

<div class="login-page-wrapper">
    <div class="login-card">
        <h1 class="login-title">PangOrganic</h1>
        <p class="login-subtitle">เข้าสู่ระบบเพื่อสั่งซื้อและจัดส่ง</p>
        
        <form action="#" id="login-form" class="login-form">
            <div class="input-group">
                <label for="email">อีเมล (E-mail)</label>
                <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">รหัสผ่าน (Password)</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember">
                    <span>จดจำฉันไว้</span>
                </label>
                <a href="#" class="forgot-password">ลืมรหัสผ่าน?</a>
            </div>
            
            <button type="submit" class="login-btn">LOGIN</button>
        </form>
        
        <div class="login-footer">
            <p>ยังไม่มีบัญชี? <a href="{% url 'register' %}" class="register-link">สมัครสมาชิก</a></p>
            <a href="{% url 'index' %}" class="back-link">← กลับหน้าแรก</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault(); 
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (email !== "" && password !== "") {
            alert('เข้าสู่ระบบสำเร็จ!');
            // ส่งผู้ใช้ไปยังหน้าแรกของเว็บไซต์
            window.location.href = "{% url 'index' %}"; 
        } else {
            alert('กรุณากรอกข้อมูลให้ครบถ้วน');
        }
    });
</script>
{% endblock %}
