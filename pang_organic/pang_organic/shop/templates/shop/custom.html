{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<style>
    /* สไตล์เฉพาะหน้า Custom */
    .custom-form-section { padding: 50px 5%; background-color: #fdfaf7; }
    .custom-form-container { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .custom-form-title { color: #6b4423; text-align: center; margin-bottom: 30px; font-size: 1.5rem; }
    
    .form-group { margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
    .form-group-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .form-group h3 { color: #6b4423; margin: 0; }
    
    .required-badge { background: #6b4423; color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; }
    .optional-badge { background: #ddd; color: #666; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; }

    .radio-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    .radio-label { display: flex; align-items: center; padding: 15px; border: 2px solid #f4f4f4; border-radius: 12px; cursor: pointer; transition: 0.3s; }
    .radio-label:hover { border-color: #6b4423; background: #fdfaf7; }
    .radio-label input { margin-right: 12px; accent-color: #6b4423; }
    
    .radio-text { flex: 1; font-weight: 500; }
    .radio-price { color: #888; font-size: 0.9rem; }

    .custom-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; padding-top: 20px; border-top: 3px solid #6b4423; }
    .total-box { font-size: 1.5rem; font-weight: bold; color: #6b4423; }
    .add-to-cart-btn-custom { background: #6b4423; color: white; padding: 15px 40px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .add-to-cart-btn-custom:hover { background: #56361c; transform: translateY(-2px); }

    .floating-cart-menu { position: fixed; bottom: 30px; right: 30px; background: #6b4423; padding: 15px; border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.2); cursor: pointer; }
    .floating-cart-menu img { width: 30px; height: 30px; filter: brightness(0) invert(1); }
</style>

<div class="Custom-Bread-text" style="text-align: center; padding: 40px 0;">
    <h1 style="font-size: 3.5rem; color: #6b4423; text-shadow: 2px 2px 4px rgba(0,0,0,0.1);">Custom Bread</h1>
</div>

<section class="custom-form-section">
    <div class="custom-form-container">
        <h2 class="custom-form-title">Select your option by clicking the circle</h2>
        
        <form id="custom-bread-form">
            <div class="form-group">
                <div class="form-group-header">
                    <h3>Choose Your Base</h3>
                    <span class="required-badge">Required</span>
                </div>
                <div class="radio-options">
                    <label class="radio-label">
                        <input type="radio" name="base" value="Banana Bread" data-price="170">
                        <span class="radio-text">Banana Bread</span>
                        <span class="radio-price">(+170 THB)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="base" value="Chocolate Bread" data-price="150" checked>
                        <span class="radio-text">Chocolate Bread</span>
                        <span class="radio-price">(+150 THB)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="base" value="Lemon Loaf" data-price="150">
                        <span class="radio-text">Lemon Loaf</span>
                        <span class="radio-price">(+150 THB)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="base" value="Whole Wheat" data-price="150">
                        <span class="radio-text">Whole Wheat</span>
                        <span class="radio-price">(+150 THB)</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <div class="form-group-header">
                    <h3>Size</h3>
                    <span class="required-badge">Required</span>
                </div>
                <div class="radio-options">
                    <label class="radio-label">
                        <input type="radio" name="size" value="Small" data-price="0">
                        <span class="radio-text">Small (1-2 servings)</span>
                        <span class="radio-price">(+0 THB)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="size" value="Medium" data-price="20">
                        <span class="radio-text">Medium (3-4 servings)</span>
                        <span class="radio-price">(+20 THB)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="size" value="Large" data-price="40" checked>
                        <span class="radio-text">Large (5-6 servings)</span>
                        <span class="radio-price">(+40 THB)</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <div class="form-group-header">
                    <h3>Toppings / Add-ons</h3>
                    <span class="optional-badge">Optional</span>
                </div>
                <div class="radio-options">
                    <label class="radio-label">
                        <input type="radio" name="topping" value="Chocolate Chips" data-price="40" checked>
                        <span class="radio-text">Chocolate Chips</span>
                        <span class="radio-price">(+40 THB)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="topping" value="Almond / Nuts" data-price="40">
                        <span class="radio-text">Almond / Nuts</span>
                        <span class="radio-price">(+40 THB)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="topping" value="No Topping" data-price="0">
                        <span class="radio-text">No Topping</span>
                        <span class="radio-price">(+0 THB)</span>
                    </label>
                </div>
            </div>
        </form>

        <div class="custom-footer">
            <div class="total-box">
                <span style="font-size: 1rem; color: #888;">Total:</span>
                <span id="total-price">0 THB</span>
            </div>
            <button type="button" class="add-to-cart-btn-custom" onclick="addToCartCustom()">Add to Cart</button>
        </div>
    </div>
</section>

<div class="floating-cart-menu" onclick="location.href='{% url 'cart' %}'" style="cursor: pointer; display: flex; align-items: center; justify-content: center;">
    <i class="fas fa-shopping-cart" style="color: white; font-size: 24px;"></i>
</div>

<script>
    function calculateTotal() {
        let total = 0;
        const base = document.querySelector('input[name="base"]:checked');
        const size = document.querySelector('input[name="size"]:checked');
        const topping = document.querySelector('input[name="topping"]:checked');

        if (base) total += parseInt(base.dataset.price) || 0;
        if (size) total += parseInt(size.dataset.price) || 0;
        if (topping) total += parseInt(topping.dataset.price) || 0;
        
        document.getElementById('total-price').textContent = total.toLocaleString() + ' THB';
        return total;
    }

    // อัปเดตราคาทุกครั้งที่คลิกเลือก
    document.querySelectorAll('input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', calculateTotal);
    });

    // ฟังก์ชันเพิ่มลงตะกร้าจริง
    function addToCartCustom() {
        const base = document.querySelector('input[name="base"]:checked');
        const size = document.querySelector('input[name="size"]:checked');
        const topping = document.querySelector('input[name="topping"]:checked');

        // Check if all required are selected (เผื่อบางอันไม่ได้เลือก checked ไว้แต่แรก)
        if (!base || !size) {
            alert('Please select all required options');
            return;
        }

        const price = calculateTotal();

        const customItem = {
            // ใช้ชื่อให้ดูสวยงาม
            name: "Custom " + base.value,
            description: `Size: ${size.value}, Topping: ${topping ? topping.value : 'None'}`,
            price: price,
            quantity: 1,
            // ใส่ Path รูปให้ถูกต้อง เพื่อให้หน้า Cart ดึงไปโชว์ได้
            image: "{% static 'shop/images/pang8.png' %}" 
        };

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        // สำหรับสินค้า Custom แนะนำให้ push ใหม่เสมอ (ไม่เอาไปรวมกับอันเดิม) 
        // เพราะแต่ละชิ้นอาจจะเลือก Topping ไม่เหมือนกัน
        cart.push(customItem);
        
        localStorage.setItem('cart', JSON.stringify(cart));

        alert('Added your custom bread to cart!');
        window.location.href = "{% url 'cart' %}";
    }

    // คำนวณครั้งแรกเมื่อโหลดหน้า
    document.addEventListener('DOMContentLoaded', calculateTotal);
</script>
{% endblock %}
