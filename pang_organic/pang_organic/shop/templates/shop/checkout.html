{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<style>
    /* สไตล์เพิ่มเติมสำหรับหน้า Checkout */
    .checkout-section { padding: 40px 5%; background-color: #fdfaf7; }
    .checkout-container { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }
    .checkout-left, .checkout-right { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #6b4423; }
    .form-input, .form-textarea, .form-select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .payment-options { margin: 20px 0; }
    .payment-option { margin-bottom: 10px; padding: 15px; border: 1px solid #eee; border-radius: 10px; cursor: pointer; transition: 0.3s; }
    .payment-option:hover { background: #fdfaf7; }
    .order-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
    .order-item-image img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
    .total-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .total-row.final { border-top: 2px solid #6b4423; pt: 10px; font-weight: bold; font-size: 1.2rem; color: #6b4423; }
    .place-order-btn { width: 100%; background: #6b4423; color: white; padding: 15px; border: none; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
    .promo-code { display: flex; gap: 10px; margin: 20px 0; }
    .promo-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    .apply-promo { background: #333; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; }
</style>

<h1 style="text-align: center; padding: 30px; font-size: 3rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); color: #6b4423;">Checkout</h1>

<section class="checkout-section">
    <div class="checkout-container">
        <div class="checkout-left">
            <div class="checkout-form">
                <h2 style="color: #6b4423; margin-bottom: 20px; border-bottom: 2px solid #f4f4f4; padding-bottom: 10px;">Delivery Information</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" class="form-input" placeholder="First Name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" class="form-input" placeholder="Last Name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" class="form-input" placeholder="Email Address" required>
                </div>

                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" class="form-input" placeholder="Phone Number" required>
                </div>

                <div class="form-group">
                    <label>Delivery Address *</label>
                    <textarea class="form-textarea" rows="3" placeholder="Street Address, City, Postal Code" required></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Delivery Date *</label>
                        <input type="date" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Delivery Time *</label>
                        <select class="form-select" required>
                            <option value="">Select Time</option>
                            <option value="9-12">9:00 AM - 12:00 PM</option>
                            <option value="12-15">12:00 PM - 3:00 PM</option>
                            <option value="15-18">3:00 PM - 6:00 PM</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="payment-form" style="margin-top: 40px;">
                <h2 style="color: #6b4423; margin-bottom: 20px; border-bottom: 2px solid #f4f4f4; padding-bottom: 10px;">Payment Method</h2>
                
                <div class="payment-options">
                    <div class="payment-option">
                        <input type="radio" id="credit-card" name="payment" value="credit-card" checked>
                        <label for="credit-card">💳 Credit/Debit Card</label>
                    </div>
                    <div class="payment-option">
                        <input type="radio" id="promptpay" name="payment" value="promptpay">
                        <label for="promptpay">📱 PromptPay</label>
                    </div>
                    <div class="payment-option">
                        <input type="radio" id="cash" name="payment" value="cash">
                        <label for="cash">💵 Cash on Delivery</label>
                    </div>
                </div>

                <div id="card-details">
                    <div class="form-group">
                        <label>Card Number *</label>
                        <input type="text" class="form-input" placeholder="1234 5678 9012 3456" maxlength="19">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Expiry Date *</label>
                            <input type="text" class="form-input" placeholder="MM/YY" maxlength="5">
                        </div>
                        <div class="form-group">
                            <label>CVV *</label>
                            <input type="text" class="form-input" placeholder="123" maxlength="3">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="checkout-right">
            <div class="order-summary">
                <h2 style="color: #6b4423; margin-bottom: 20px;">Order Summary</h2>
                
                <div class="order-items" id="order-items">
                    </div>

                <div class="order-totals" style="margin-top: 20px;">
                    <div class="total-row">
                        <span id="subtotal-text">Subtotal (0 items)</span>
                        <span class="subtotal">0 THB</span>
                    </div>
                    <div class="total-row">
                        <span>Delivery Fee</span>
                        <span>50 THB</span>
                    </div>
                    <div class="total-row final">
                        <span>Total</span>
                        <span class="total-amount">0 THB</span>
                    </div>
                </div>

                <div class="promo-code">
                    <input type="text" class="promo-input" placeholder="Promo code">
                    <button class="apply-promo">Apply</button>
                </div>

                <div class="place-order-section">
                    <div class="terms-checkbox" style="margin-bottom: 15px; font-size: 0.9rem;">
                        <input type="checkbox" id="terms" required>
                        <label for="terms"> I agree to the <a href="#" style="color: #6b4423;">Terms & Conditions</a></label>
                    </div>
                    <button class="place-order-btn" onclick="placeOrder()">Place Order</button>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadCheckoutItems();
        setupPaymentOptions();
    });

    function loadCheckoutItems() {
        const orderItemsContainer = document.getElementById('order-items');
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        if (cart.length === 0) {
            orderItemsContainer.innerHTML = '<p style="text-align:center; padding:20px;">No items in cart</p>';
            return;
        }

        let itemsHTML = '';
        let subtotal = 0;
        let totalItems = 0;

        cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            subtotal += itemTotal;
            totalItems += item.quantity;
            
            // ปรับ Path รูปภาพ
            let imgSrc = item.image;
            if (!imgSrc.startsWith('http') && !imgSrc.startsWith('/static/')) {
                imgSrc = "{% get_static_prefix %}shop/images/" + imgSrc.split('/').pop();
            }

            itemsHTML += `
                <div class="order-item">
                    <div class="order-item-image">
                        <img src="${imgSrc}" alt="${item.name}">
                    </div>
                    <div class="order-item-details" style="flex:1;">
                        <h4 style="margin:0;">${item.name}</h4>
                        <p style="margin:5px 0; font-size:0.85rem; color:#888;">Qty: ${item.quantity}</p>
                    </div>
                    <div class="order-item-price" style="font-weight:bold;">
                        ${itemTotal} THB
                    </div>
                </div>
            `;
        });
        
        orderItemsContainer.innerHTML = itemsHTML;
        
        // อัปเดตราคา
        const delivery = 50;
        document.querySelector('.subtotal').textContent = `${subtotal} THB`;
        document.querySelector('.total-amount').textContent = `${subtotal + delivery} THB`;
        document.getElementById('subtotal-text').textContent = `Subtotal (${totalItems} items)`;
    }

    function setupPaymentOptions() {
        const paymentRadios = document.querySelectorAll('input[name="payment"]');
        const cardDetails = document.getElementById('card-details');
        
        paymentRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                cardDetails.style.display = (this.value === 'credit-card') ? 'block' : 'none';
            });
        });
    }

    function placeOrder() {
        const termsCheckbox = document.getElementById('terms');
        if (!termsCheckbox.checked) {
            alert('Please agree to the Terms & Conditions');
            return;
        }

        alert('Order placed successfully! Thank you for choosing Pang Organic.');
        localStorage.removeItem('cart');
        window.location.href = "{% url 'index' %}";
    }
</script>
{% endblock %}
