{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<style>
    /* สไตล์เฉพาะหน้า Customers */
    .customers-section { padding: 50px 5%; background-color: #fdfaf7; min-height: 80vh; }
    .customers-container { max-width: 900px; margin: 0 auto; }
    
    .card { 
        background: white; 
        padding: 25px; 
        margin-bottom: 20px; 
        border-radius: 15px; 
        box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
        border-left: 5px solid #6b4423;
    }

    .form-card {
        background: #fff;
        padding: 30px;
        border-radius: 20px;
        margin-bottom: 40px;
        box-shadow: 0 10px 25px rgba(107, 68, 35, 0.1);
    }

    .form-title { color: #6b4423; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

    .input-group { display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; }
    
    input { 
        padding: 12px 15px; 
        border-radius: 10px; 
        border: 1px solid #ddd; 
        font-family: 'Kanit', sans-serif;
        outline: none;
    }
    
    input:focus { border-color: #6b4423; }

    .btn-add { 
        padding: 10px 25px; 
        background: #6b4423; 
        color: white; 
        border: none; 
        border-radius: 10px; 
        cursor: pointer; 
        font-weight: bold;
        transition: 0.3s;
    }
    
    .btn-add:hover { background: #56361c; transform: translateY(-2px); }

    .customer-item { display: flex; justify-content: space-between; align-items: center; }
    .customer-info h3 { margin: 0; color: #6b4423; font-size: 1.2rem; }
    .customer-info p { margin: 5px 0 0; color: #888; }

    .btn-delete { 
        background: #ffeded; 
        color: #d9534f; 
        border: 1px solid #ffcccc; 
        padding: 8px 15px; 
        border-radius: 8px; 
        cursor: pointer;
        transition: 0.2s;
    }
    
    .btn-delete:hover { background: #d9534f; color: white; }

    /* สำหรับหน้าจอเล็ก */
    @media (max-width: 600px) {
        .input-group { grid-template-columns: 1fr; }
    }
</style>

<div style="text-align: center; padding: 40px 0;">
    <h1 style="font-size: 3rem; color: #6b4423; text-shadow: 2px 2px 4px rgba(0,0,0,0.1);">Customer Management</h1>
    <p style="color: #888;">จัดการข้อมูลลูกค้าสำหรับ Pang Organic Bakery</p>
</div>

<section class="customers-section">
    <div class="customers-container">

        <div class="form-card">
            <h3 class="form-title"><span>➕</span> เพิ่มรายชื่อลูกค้าใหม่</h3>
            <div class="input-group">
                <input type="text" id="name" placeholder="ชื่อ-นามสกุล">
                <input type="text" id="phone" placeholder="เบอร์โทรศัพท์">
                <button class="btn-add" onclick="addCustomer()">เพิ่มข้อมูล</button>
            </div>
        </div>

        <h2 style="color: #6b4423; margin-bottom: 20px;">รายชื่อลูกค้าทั้งหมด</h2>
        <div id="customerList">
            </div>

    </div>
</section>

<script>
    // ข้อมูลเริ่มต้น (ในระบบจริงควรดึงจาก Database ของ Django)
    let customers = [
        { id: 1, name: "คุณสมชาย ออร์แกนิก", phone: "081-234-5678" },
        { id: 2, name: "คุณสมหญิง ใจดี", phone: "089-999-9999" }
    ];

    function renderCustomers() {
        let html = "";
        
        if (customers.length === 0) {
            html = '<p style="text-align:center; color:#888; padding:20px;">ไม่มีรายชื่อลูกค้าในระบบ</p>';
        } else {
            customers.forEach(c => {
                html += `
                    <div class="card">
                        <div class="customer-item">
                            <div class="customer-info">
                                <h3>👤 ${c.name}</h3>
                                <p>📞 ${c.phone}</p>
                            </div>
                            <button class="btn-delete" onclick="deleteCustomer(${c.id})">
                                ❌ ลบรายการ
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById("customerList").innerHTML = html;
    }

    function addCustomer() {
        let nameInput = document.getElementById("name");
        let phoneInput = document.getElementById("phone");

        if (nameInput.value === "" || phoneInput.value === "") {
            alert("กรุณากรอกข้อมูลให้ครบถ้วน");
            return;
        }

        customers.unshift({
            id: Date.now(),
            name: nameInput.value,
            phone: phoneInput.value
        });

        // ล้างค่าในช่อง input
        nameInput.value = "";
        phoneInput.value = "";

        renderCustomers();
    }

    function deleteCustomer(id) {
        if (confirm("ยืนยันการลบข้อมูลลูกค้ารายนี้?")) {
            customers = customers.filter(c => c.id !== id);
            renderCustomers();
        }
    }

    // เรียกใช้งานครั้งแรก
    renderCustomers();
</script>
{% endblock %}
