{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<style>
    /* สไตล์เฉพาะหน้า Reports */
    .reports-section { padding: 50px 5%; background-color: #fdfaf7; min-height: 80vh; }
    .reports-container { max-width: 1000px; margin: 0 auto; }
    
    .stats-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
        gap: 20px; 
        margin-bottom: 30px; 
    }

    .card { 
        background: white; 
        padding: 25px; 
        border-radius: 20px; 
        box-shadow: 0 10px 20px rgba(107, 68, 35, 0.05); 
        text-align: center;
        border-bottom: 4px solid #6b4423;
    }

    .card p { margin: 0; color: #888; font-size: 1rem; }
    .card .big { 
        font-size: 2rem; 
        font-weight: bold; 
        color: #6b4423; 
        margin-top: 10px; 
        display: block;
    }

    .table-card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 20px rgba(107, 68, 35, 0.05);
    }

    table { 
        width: 100%; 
        border-collapse: collapse; 
        margin-top: 20px; 
    }
    
    th { 
        background-color: #fdfaf7; 
        color: #6b4423; 
        padding: 15px; 
        text-align: left;
        border-bottom: 2px solid #6b4423;
    }
    
    td { 
        padding: 15px; 
        border-bottom: 1px solid #eee; 
        color: #555;
    }

    .status-pill {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: bold;
    }
    .status-success { background: #e8f5e9; color: #2e7d32; }
    .status-pending { background: #fff3e0; color: #ef6c00; }

    @media (max-width: 600px) {
        .stats-grid { grid-template-columns: 1fr; }
        th, td { padding: 10px; font-size: 0.9rem; }
    }
</style>

<div style="text-align: center; padding: 40px 0;">
    <h1 style="font-size: 3rem; color: #6b4423; text-shadow: 2px 2px 4px rgba(0,0,0,0.1);">Sales Report</h1>
    <p style="color: #888;">สรุปภาพรวมยอดขายและสถิติต่างๆ ของร้าน</p>
</div>

<section class="reports-section">
    <div class="reports-container">

        <div class="stats-grid">
            <div class="card">
                <p>💰 ยอดขายรวมที่สำเร็จ</p>
                <span class="big" id="totalSales">0 บาท</span>
            </div>
            <div class="card">
                <p>🧾 จำนวนออเดอร์ทั้งหมด</p>
                <span class="big" id="totalOrders">0</span>
            </div>
            <div class="card">
                <p>🥖 สินค้าที่ขายดีที่สุด</p>
                <span class="big" style="font-size: 1.5rem;">Sourdough</span>
            </div>
        </div>

        <div class="table-card">
            <h3 style="color: #6b4423; margin-bottom: 20px;">📋 รายละเอียดรายการสั่งซื้อ</h3>
            <table>
                <thead>
                    <tr>
                        <th>สินค้า</th>
                        <th>ราคา</th>
                        <th>สถานะการชำระเงิน</th>
                    </tr>
                </thead>
                <tbody id="reportTable">
                    </tbody>
            </table>
        </div>

    </div>
</section>

<script>
    // ข้อมูลจำลอง (Mock Data)
    let orders = [
        { name: "Classic American loaf bread", price: 165, status: "success" },
        { name: "Sourdough Bread", price: 220, status: "success" },
        { name: "Focaccia Bread", price: 289, status: "pending" },
        { name: "Olive Bread", price: 159, status: "success" }
    ];

    function loadReport() {
        let total = 0;
        let count = orders.length;
        let tableHtml = "";

        orders.forEach(o => {
            if (o.status === "success") {
                total += o.price;
            }

            const statusClass = o.status === "success" ? "status-success" : "status-pending";
            const statusText = o.status === "success" ? "ชำระเงินสำเร็จ" : "รอดำเนินการ";

            tableHtml += `
                <tr>
                    <td style="font-weight:bold;">${o.name}</td>
                    <td>${o.price.toLocaleString()} THB</td>
                    <td><span class="status-pill ${statusClass}">${statusText}</span></td>
                </tr>
            `;
        });

        document.getElementById("totalSales").innerText = total.toLocaleString() + " บาท";
        document.getElementById("totalOrders").innerText = count + " รายการ";
        document.getElementById("reportTable").innerHTML = tableHtml;
    }

    // เริ่มทำงานเมื่อโหลดหน้า
    window.onload = loadReport;
</script>
{% endblock %}
